name: Ingest Rust Tests

on:
    push:
        branches: [main]
        paths:
            - "apps/ingest/**"
            - "packages/db/drizzle/**"
            - "packages/db/src/schema/**"
            - ".github/workflows/ingest-rust-tests.yml"
    pull_request:
        paths:
            - "apps/ingest/**"
            - "packages/db/drizzle/**"
            - "packages/db/src/schema/**"
            - ".github/workflows/ingest-rust-tests.yml"
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    pull-requests: write

jobs:
    test:
        name: Cargo test and bench
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: apps/ingest
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

            - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
              with:
                  workspaces: apps/ingest

            - name: Run ingest unit and fake Tinybird e2e tests
              run: |
                  set -o pipefail
                  cargo test 2>&1 | tee "$RUNNER_TEMP/ingest-cargo-test.txt"

            - name: Run Criterion ingest benchmarks
              run: |
                  set -o pipefail
                  cargo bench --bench ingest_bench -- --sample-size 10 --warm-up-time 1 --measurement-time 1 2>&1 | tee "$RUNNER_TEMP/ingest-criterion-bench.txt"

            - name: Comment PR with ingest test results
              if: ${{ always() && github.event_name == 'pull_request' }}
              env:
                  GH_TOKEN: ${{ github.token }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
              run: |
                  test_output="$RUNNER_TEMP/ingest-cargo-test.txt"
                  bench_output="$RUNNER_TEMP/ingest-criterion-bench.txt"
                  body="$RUNNER_TEMP/ingest-results-comment.md"

                  {
                    echo "## Ingest Rust Results"
                    echo
                    echo "**Commit:** \`${GITHUB_SHA}\`"
                    echo
                    echo "### cargo test"
                    echo
                    echo '```text'
                    if [ -f "$test_output" ]; then
                      tail -n 80 "$test_output"
                    else
                      echo "cargo test did not produce output."
                    fi
                    echo '```'
                    echo
                    echo "### Criterion benchmarks"
                    echo
                    echo '```text'
                    if [ -f "$bench_output" ]; then
                      tail -n 120 "$bench_output"
                    else
                      echo "criterion benchmark did not run."
                    fi
                    echo '```'
                  } > "$body"

                  gh pr comment "$PR_NUMBER" --body-file "$body"
