name: Ingest Rust Tests

on:
    push:
        branches: [main]
        paths:
            - "apps/ingest/**"
            - "packages/db/drizzle/**"
            - "packages/db/src/schema/**"
            - ".github/scripts/format-ingest-benchmark-comment.py"
            - ".github/workflows/ingest-rust-tests.yml"
    pull_request:
        paths:
            - "apps/ingest/**"
            - "packages/db/drizzle/**"
            - "packages/db/src/schema/**"
            - ".github/scripts/format-ingest-benchmark-comment.py"
            - ".github/workflows/ingest-rust-tests.yml"
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    pull-requests: write

jobs:
    test:
        name: Cargo test and load benchmark
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: apps/ingest
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

            - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
              with:
                  workspaces: apps/ingest

            - name: Run ingest unit and fake Tinybird e2e tests
              run: |
                  set +e
                  set -o pipefail
                  cargo test 2>&1 | tee "$RUNNER_TEMP/ingest-cargo-test.txt"
                  echo "${PIPESTATUS[0]}" > "$RUNNER_TEMP/ingest-cargo-test.exit"
                  exit 0

            - name: Build PR ingest and benchmark binaries
              run: |
                  set +e
                  cargo build --release --bin maple-ingest --bin load_test 2>&1 | tee "$RUNNER_TEMP/ingest-head-build.txt"
                  echo "${PIPESTATUS[0]}" > "$RUNNER_TEMP/ingest-head-build.exit"
                  mkdir -p "$RUNNER_TEMP/head"
                  if [ -x target/release/maple-ingest ]; then
                    cp target/release/maple-ingest "$RUNNER_TEMP/head/maple-ingest"
                  fi
                  if [ -x target/release/load_test ]; then
                    cp target/release/load_test "$RUNNER_TEMP/head/load_test"
                  fi
                  exit 0

            - name: Run PR native ingest load benchmark
              run: |
                  set +e
                  set -o pipefail
                  LOAD_TEST_INGEST_BIN="$RUNNER_TEMP/head/maple-ingest" \
                    LOAD_TEST_INGEST_MODE=tinybird \
                    LOAD_TEST_REQUESTS=2000 \
                    LOAD_TEST_CONCURRENCY=64 \
                    LOAD_TEST_BATCH_LOGS=10 \
                    LOAD_TEST_INGEST_PORT=3475 \
                    LOAD_TEST_QUEUE_DIR="$RUNNER_TEMP/head-wal" \
                    "$RUNNER_TEMP/head/load_test" 2>&1 | tee "$RUNNER_TEMP/ingest-head-load.json"
                  echo "${PIPESTATUS[0]}" > "$RUNNER_TEMP/ingest-head-load.exit"
                  exit 0

            - name: Build main ingest binary
              if: ${{ github.event_name == 'pull_request' }}
              run: |
                  set +e
                  git fetch origin "${{ github.base_ref }}" --depth=1
                  git worktree add "$RUNNER_TEMP/base" FETCH_HEAD
                  (
                    cd "$RUNNER_TEMP/base/apps/ingest"
                    cargo build --release --bin maple-ingest
                  ) 2>&1 | tee "$RUNNER_TEMP/ingest-base-build.txt"
                  echo "${PIPESTATUS[0]}" > "$RUNNER_TEMP/ingest-base-build.exit"
                  exit 0

            - name: Run main collector-forwarding load benchmark
              if: ${{ github.event_name == 'pull_request' }}
              run: |
                  set +e
                  set -o pipefail
                  LOAD_TEST_INGEST_BIN="$RUNNER_TEMP/base/apps/ingest/target/release/maple-ingest" \
                    LOAD_TEST_INGEST_MODE=forward \
                    LOAD_TEST_REQUESTS=2000 \
                    LOAD_TEST_CONCURRENCY=64 \
                    LOAD_TEST_BATCH_LOGS=10 \
                    LOAD_TEST_INGEST_PORT=3476 \
                    LOAD_TEST_QUEUE_DIR="$RUNNER_TEMP/base-wal" \
                    "$RUNNER_TEMP/head/load_test" 2>&1 | tee "$RUNNER_TEMP/ingest-base-load.json"
                  echo "${PIPESTATUS[0]}" > "$RUNNER_TEMP/ingest-base-load.exit"
                  exit 0

            - name: Comment PR with ingest test results
              if: ${{ always() && github.event_name == 'pull_request' }}
              env:
                  GH_TOKEN: ${{ github.token }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                  TEST_OUTPUT: ${{ runner.temp }}/ingest-cargo-test.txt
                  HEAD_LOAD_JSON: ${{ runner.temp }}/ingest-head-load.json
                  BASE_LOAD_JSON: ${{ runner.temp }}/ingest-base-load.json
                  COMMENT_OUTPUT: ${{ runner.temp }}/ingest-results-comment.md
              run: |
                  python "$GITHUB_WORKSPACE/.github/scripts/format-ingest-benchmark-comment.py"
                  gh pr comment "$PR_NUMBER" --body-file "$COMMENT_OUTPUT"

            - name: Fail if ingest checks failed
              if: ${{ always() }}
              run: |
                  failed=0
                  for file in "$RUNNER_TEMP"/ingest-*.exit; do
                    [ -f "$file" ] || continue
                    code=$(cat "$file")
                    if [ "$code" != "0" ]; then
                      echo "::error file=$file::step failed with exit code $code"
                      failed=1
                    fi
                  done
                  exit "$failed"
