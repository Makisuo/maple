{{- if and .Values.clusterCollector.enabled (or .Values.presets.clusterMetrics.enabled .Values.presets.k8sEvents.enabled .Values.presets.fargateMetrics.enabled) -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "maple-k8s-infra.cluster.fullname" . }}
  labels:
    {{- include "maple-k8s-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: cluster-collector
data:
  config.yaml: |-
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    receivers:
      {{- if .Values.presets.clusterMetrics.enabled }}
      k8s_cluster:
        collection_interval: {{ .Values.presets.clusterMetrics.collectionInterval }}
        node_conditions_to_report:
          {{- toYaml .Values.presets.clusterMetrics.nodeConditionsToReport | nindent 10 }}
        allocatable_types_to_report:
          {{- toYaml .Values.presets.clusterMetrics.allocatableTypesToReport | nindent 10 }}
        resource_attributes:
          {{- toYaml .Values.presets.clusterMetrics.resourceAttributes | nindent 10 }}
        metrics:
          {{- toYaml .Values.presets.clusterMetrics.metrics | nindent 10 }}
      {{- end }}
      {{- if .Values.presets.fargateMetrics.enabled }}
      # EKS Fargate exposes per-pod cAdvisor metrics via the API server proxy.
      # We scrape only Fargate-typed nodes; EC2 nodes are covered by the
      # DaemonSet's kubeletstats receiver, so we don't double-count.
      prometheus:
        config:
          scrape_configs:
            - job_name: maple-fargate-cadvisor
              scheme: https
              scrape_interval: {{ .Values.presets.fargateMetrics.collectionInterval }}
              kubernetes_sd_configs:
                - role: node
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              tls_config:
                ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                insecure_skip_verify: true
              relabel_configs:
                - source_labels: [__meta_kubernetes_node_label_eks_amazonaws_com_compute_type]
                  action: keep
                  regex: fargate
                - target_label: __address__
                  replacement: kubernetes.default.svc:443
                - source_labels: [__meta_kubernetes_node_name]
                  regex: (.+)
                  target_label: __metrics_path__
                  replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
                - source_labels: [__meta_kubernetes_node_name]
                  target_label: k8s_node_name
              metric_relabel_configs:
                # Keep usage gauges + cAdvisor spec metrics (limits/period)
                # so metricsgeneration can divide usage / limit to synthesize
                # k8s.pod.{cpu,memory}_limit_utilization for the Pods view.
                - source_labels: [__name__]
                  regex: 'container_cpu_usage_seconds_total|container_memory_working_set_bytes|container_spec_cpu_quota|container_spec_cpu_period|container_spec_memory_limit_bytes'
                  action: keep
                # Drop the synthesized whole-pod (no container) rows so we
                # don't double-count when summing per-container usage.
                - source_labels: [container]
                  regex: '^$|POD'
                  action: drop
                # Drop the per-CPU dimension on container_cpu_usage_seconds_total
                # (only cpu="total" is emitted on Fargate kubelets) so its
                # datapoint attributes match the spec metrics — required by
                # metricsgeneration's pairwise divide.
                - regex: cpu
                  action: labeldrop
      {{- end }}
      {{- if .Values.presets.k8sEvents.enabled }}
      k8sobjects/events:
        auth_type: serviceAccount
        objects:
          - name: events
            mode: watch
            group: events.k8s.io
            {{- if .Values.presets.k8sEvents.namespaces }}
            namespaces:
              {{- toYaml .Values.presets.k8sEvents.namespaces | nindent 14 }}
            {{- end }}
      {{- end }}

    processors:
      memory_limiter:
        check_interval: {{ .Values.processors.memoryLimiter.checkInterval }}
        limit_mib: {{ .Values.processors.memoryLimiter.limitMiB }}
        spike_limit_mib: {{ .Values.processors.memoryLimiter.spikeLimitMiB }}
      {{- if .Values.processors.kubernetesAttributes.enabled }}
      k8sattributes:
        passthrough: false
        pod_association:
          {{- toYaml .Values.processors.kubernetesAttributes.podAssociation | nindent 10 }}
        extract:
          metadata:
            {{- toYaml .Values.processors.kubernetesAttributes.extract.metadata | nindent 12 }}
          {{- with .Values.processors.kubernetesAttributes.extract.labels }}
          labels:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- end }}
      {{- if .Values.processors.resourceDetection.enabled }}
      resourcedetection:
        detectors:
          {{- if eq .Values.global.cloud "aws" }}
          # See agent-configmap.yaml for why `eks` is dropped — same
          # IMDS lookup hard-fails in contrib v0.151+ on Auto Mode nodes.
          - ec2
          {{- end }}
          {{- if hasPrefix "gcp" .Values.global.cloud }}
          - gcp
          {{- end }}
          {{- if eq .Values.global.cloud "azure" }}
          - azure
          {{- end }}
          - env
        timeout: {{ .Values.processors.resourceDetection.timeout }}
        override: {{ .Values.processors.resourceDetection.override }}
      {{- end }}
      batch:
        timeout: {{ .Values.processors.batch.timeout }}
        send_batch_size: {{ .Values.processors.batch.sendBatchSize }}
        send_batch_max_size: {{ .Values.processors.batch.sendBatchMaxSize }}
      {{- if .Values.maple.tinybirdExport.enabled }}
      # `maple_org_id` is the routing key on every Tinybird datasource. Set as a
      # resource attribute so it's preserved through batch + the tinybird exporter.
      resource/maple_org:
        attributes:
          - key: maple_org_id
            value: {{ required "maple.tinybirdExport.orgId is required when tinybirdExport.enabled is true" .Values.maple.tinybirdExport.orgId | quote }}
            action: upsert
      {{- end }}
      {{- /* ClickHouse path: org id stamping happens inside mapleexporter — no
             resource processor needed. */}}
      {{- if .Values.presets.fargateMetrics.enabled }}
      # cAdvisor exposes container_cpu_usage_seconds_total as a cumulative
      # counter in seconds. Convert it to a per-second gauge so it matches
      # kubeletstats' k8s.pod.cpu.usage (cores).
      cumulativetodelta/fargate:
        include:
          metrics:
            - container_cpu_usage_seconds_total
          match_type: strict
      deltatorate/fargate:
        metrics:
          - container_cpu_usage_seconds_total
      # The prometheus receiver creates one ResourceMetrics per scrape target
      # (one Fargate node) with all pods' datapoints sharing it. We need each
      # pod/container's datapoints under their own Resource so transform's
      # set(resource.attributes[...]) doesn't clobber siblings — groupbyattrs
      # promotes the listed attributes to resource and splits accordingly.
      groupbyattrs/fargate:
        keys:
          - pod
          - namespace
          - container
          - k8s_node_name
      # Rename promoted attrs to OTel kubeletstats convention. We split the
      # transform into a "cleanup" pass (resource attrs + datapoint cleanup)
      # that runs BEFORE metricsgeneration, and a "rename" pass that runs
      # AFTER — metricsgeneration uses the cAdvisor names to find sources.
      transform/fargate-cleanup:
        error_mode: ignore
        metric_statements:
          - context: resource
            statements:
              - set(attributes["k8s.pod.name"], attributes["pod"]) where attributes["pod"] != nil
              - set(attributes["k8s.namespace.name"], attributes["namespace"]) where attributes["namespace"] != nil
              - set(attributes["k8s.container.name"], attributes["container"]) where attributes["container"] != nil
              - set(attributes["k8s.node.name"], attributes["k8s_node_name"]) where attributes["k8s_node_name"] != nil
              - set(attributes["eks.amazonaws.com/compute-type"], "fargate")
              - delete_key(attributes, "pod")
              - delete_key(attributes, "namespace")
              - delete_key(attributes, "container")
              - delete_key(attributes, "k8s_node_name")
          - context: datapoint
            statements:
              - delete_key(attributes, "id")
              - delete_key(attributes, "image")
              - delete_key(attributes, "name")
      # Synthesize the limit_utilization gauges the listPodsQuery already
      # reads, so Fargate pods light up the same usage bars as EC2 pods.
      # cAdvisor doesn't expose pod CPU/mem REQUESTS — only limits — so the
      # request bars stay at 0% for Fargate. Acceptable for v1.
      #
      # Split into two processor instances because rules in a single
      # metricsgeneration call can't reference metrics produced by earlier
      # rules in the same call — the second instance sees __fargate_cpu_limit_cores.
      metricsgeneration/fargate-step1:
        rules:
          # cpu_limit_cores = quota_us / period_us  (intermediate)
          - name: __fargate_cpu_limit_cores
            type: calculate
            metric1: container_spec_cpu_quota
            metric2: container_spec_cpu_period
            operation: divide
          # mem_limit_utilization = working_set_bytes / mem_limit_bytes
          - name: k8s.pod.memory_limit_utilization
            type: calculate
            metric1: container_memory_working_set_bytes
            metric2: container_spec_memory_limit_bytes
            operation: divide
      metricsgeneration/fargate-step2:
        rules:
          # cpu_limit_utilization = cpu_usage_cores / cpu_limit_cores
          - name: k8s.pod.cpu_limit_utilization
            type: calculate
            metric1: container_cpu_usage_seconds_total
            metric2: __fargate_cpu_limit_cores
            operation: divide
      transform/fargate-rename:
        error_mode: ignore
        metric_statements:
          - context: metric
            statements:
              - set(name, "k8s.pod.cpu.usage") where name == "container_cpu_usage_seconds_total"
              - set(name, "k8s.pod.memory.usage") where name == "container_memory_working_set_bytes"
      # Drop the cAdvisor spec/intermediate metrics — only the synthesized
      # k8s.pod.* metrics need to land in Tinybird.
      filter/fargate:
        error_mode: ignore
        metrics:
          metric:
            - 'name == "container_spec_cpu_quota"'
            - 'name == "container_spec_cpu_period"'
            - 'name == "container_spec_memory_limit_bytes"'
            - 'name == "__fargate_cpu_limit_cores"'
      {{- end }}

    exporters:
      {{- if eq (include "maple-k8s-infra.mapleExporterEnabled" .) "true" }}
      otlphttp/maple:
        endpoint: "${env:MAPLE_INGEST_ENDPOINT}"
        compression: {{ .Values.maple.ingest.compression }}
        tls:
          insecure: {{ .Values.maple.ingest.tls.insecure }}
          insecure_skip_verify: {{ .Values.maple.ingest.tls.insecureSkipVerify }}
        headers:
          x-maple-ingest-key: "${env:MAPLE_INGEST_KEY}"
      {{- end }}
      {{- if .Values.maple.clickhouseExport.enabled }}
      maple:
        endpoint: {{ .Values.maple.clickhouseExport.endpoint | quote }}
        database: {{ .Values.maple.clickhouseExport.database | quote }}
        username: {{ .Values.maple.clickhouseExport.username | quote }}
        password: "${env:MAPLE_CLICKHOUSE_PASSWORD}"
        org_id: {{ .Values.maple.clickhouseExport.orgId | quote }}
        {{- with .Values.maple.clickhouseExport.orgIdFromResourceAttribute }}
        org_id_from_resource_attribute: {{ . | quote }}
        {{- end }}
        timeout: {{ .Values.maple.clickhouseExport.timeout }}
        traces_table_name: {{ .Values.maple.clickhouseExport.tables.traces | quote }}
        logs_table_name: {{ .Values.maple.clickhouseExport.tables.logs | quote }}
        metrics_sum_table_name: {{ .Values.maple.clickhouseExport.tables.metricsSum | quote }}
        metrics_gauge_table_name: {{ .Values.maple.clickhouseExport.tables.metricsGauge | quote }}
        metrics_histogram_table_name: {{ .Values.maple.clickhouseExport.tables.metricsHistogram | quote }}
        metrics_exponential_histogram_table_name: {{ .Values.maple.clickhouseExport.tables.metricsExponentialHistogram | quote }}
        retry_on_failure:
          enabled: {{ .Values.maple.clickhouseExport.retryOnFailure.enabled }}
          initial_interval: {{ .Values.maple.clickhouseExport.retryOnFailure.initialInterval }}
          max_interval: {{ .Values.maple.clickhouseExport.retryOnFailure.maxInterval }}
          max_elapsed_time: {{ .Values.maple.clickhouseExport.retryOnFailure.maxElapsedTime }}
        sending_queue:
          enabled: {{ .Values.maple.clickhouseExport.sendingQueue.enabled }}
          num_consumers: {{ .Values.maple.clickhouseExport.sendingQueue.numConsumers }}
          queue_size: {{ .Values.maple.clickhouseExport.sendingQueue.queueSize }}
      {{- end }}
      {{- if .Values.maple.tinybirdExport.enabled }}
      tinybird:
        endpoint: {{ .Values.maple.tinybirdExport.endpoint | quote }}
        token: "${env:TINYBIRD_EXPORT_TOKEN}"
        timeout: {{ .Values.maple.tinybirdExport.timeout }}
        traces:
          datasource: {{ .Values.maple.tinybirdExport.datasources.traces | quote }}
        logs:
          datasource: {{ .Values.maple.tinybirdExport.datasources.logs | quote }}
        metrics:
          sum:
            datasource: {{ .Values.maple.tinybirdExport.datasources.metrics.sum | quote }}
          gauge:
            datasource: {{ .Values.maple.tinybirdExport.datasources.metrics.gauge | quote }}
          histogram:
            datasource: {{ .Values.maple.tinybirdExport.datasources.metrics.histogram | quote }}
          exponential_histogram:
            datasource: {{ .Values.maple.tinybirdExport.datasources.metrics.exponentialHistogram | quote }}
        retry_on_failure:
          enabled: {{ .Values.maple.tinybirdExport.retryOnFailure.enabled }}
          initial_interval: {{ .Values.maple.tinybirdExport.retryOnFailure.initialInterval }}
          max_interval: {{ .Values.maple.tinybirdExport.retryOnFailure.maxInterval }}
          max_elapsed_time: {{ .Values.maple.tinybirdExport.retryOnFailure.maxElapsedTime }}
        sending_queue:
          enabled: {{ .Values.maple.tinybirdExport.sendingQueue.enabled }}
          num_consumers: {{ .Values.maple.tinybirdExport.sendingQueue.numConsumers }}
          queue_size: {{ .Values.maple.tinybirdExport.sendingQueue.queueSize }}
      {{- end }}

    service:
      extensions: [health_check]
      pipelines:
        {{- if .Values.presets.clusterMetrics.enabled }}
        metrics:
          receivers: [k8s_cluster]
          processors: {{ include "maple-k8s-infra.baseProcessors" . }}
          exporters: {{ include "maple-k8s-infra.pipelineExporters" . }}
        {{- end }}
        {{- if .Values.presets.fargateMetrics.enabled }}
        metrics/fargate:
          receivers: [prometheus]
          processors:
            - memory_limiter
            - cumulativetodelta/fargate
            - deltatorate/fargate
            - groupbyattrs/fargate
            - transform/fargate-cleanup
            - metricsgeneration/fargate-step1
            - metricsgeneration/fargate-step2
            - transform/fargate-rename
            - filter/fargate
            {{- if .Values.processors.kubernetesAttributes.enabled }}
            - k8sattributes
            {{- end }}
            {{- if .Values.processors.resourceDetection.enabled }}
            - resourcedetection
            {{- end }}
            {{- if .Values.maple.tinybirdExport.enabled }}
            - resource/maple_org
            {{- end }}
            - batch
          exporters: {{ include "maple-k8s-infra.pipelineExporters" . }}
        {{- end }}
        {{- if .Values.presets.k8sEvents.enabled }}
        logs:
          receivers: [k8sobjects/events]
          processors: {{ include "maple-k8s-infra.baseProcessors" . }}
          exporters: {{ include "maple-k8s-infra.pipelineExporters" . }}
        {{- end }}
      telemetry:
        logs:
          level: {{ .Values.config.serviceTelemetry.logs.level }}
{{- end -}}
