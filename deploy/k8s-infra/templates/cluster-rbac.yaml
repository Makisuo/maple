{{- if and .Values.clusterCollector.enabled (or .Values.presets.clusterMetrics.enabled .Values.presets.k8sEvents.enabled) -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "maple-k8s-infra.cluster.fullname" . }}
  labels:
    {{- include "maple-k8s-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: cluster-collector
rules:
  - apiGroups: [""]
    resources:
      - configmaps
      - endpoints
      - events
      - namespaces
      - nodes
      - persistentvolumeclaims
      - persistentvolumes
      - pods
      - replicationcontrollers
      - resourcequotas
      - services
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["daemonsets", "deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["cronjobs", "jobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "maple-k8s-infra.cluster.fullname" . }}
  labels:
    {{- include "maple-k8s-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: cluster-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "maple-k8s-infra.cluster.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "maple-k8s-infra.cluster.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end -}}
