{{- if and .Values.agent.enabled .Values.agent.ingress.enabled .Values.agent.ingress.hosts -}}
{{- $hosts := .Values.agent.ingress.hosts -}}
{{- $tlsSecret := .Values.agent.ingress.tlsSecretName | default (printf "%s-otel-tls" (include "maple-k8s-infra.agent.fullname" .)) -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "maple-k8s-infra.agent.fullname" . }}-otel
  labels:
    {{- include "maple-k8s-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
  annotations:
    # OTLP payloads can be large (batched logs/traces) — disable nginx body
    # size cap. Override via .Values.agent.ingress.annotations if you want one.
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    {{- if .Values.agent.ingress.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.agent.ingress.clusterIssuer | quote }}
    {{- end }}
    {{- with .Values.agent.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.agent.ingress.ingressClassName | quote }}
  tls:
    - hosts:
        {{- range $hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ $tlsSecret | quote }}
  rules:
    {{- range $hosts }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: {{ $.Values.agent.ingress.path | quote }}
            pathType: {{ $.Values.agent.ingress.pathType | quote }}
            backend:
              service:
                name: {{ include "maple-k8s-infra.agent.fullname" $ }}
                port:
                  number: {{ $.Values.presets.otlpReceiver.http.containerPort }}
    {{- end }}
{{- end -}}
