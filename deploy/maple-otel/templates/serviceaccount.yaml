{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "maple-otel.serviceAccountName" . }}
  labels:
    {{- include "maple-otel.labels" . | nindent 4 }}
{{- end }}
{{- if and .Values.serviceAccount.create .Values.k8sattributes.enabled }}
---
# k8sattributes needs cluster-scoped read access to resolve incoming pod
# connections to deployment / statefulset / etc. metadata.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "maple-otel.fullname" . }}
  labels:
    {{- include "maple-otel.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["apps"]
    resources: ["replicasets", "deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "watch", "list"]
  - apiGroups: ["extensions"]
    resources: ["replicasets"]
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "maple-otel.fullname" . }}
  labels:
    {{- include "maple-otel.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "maple-otel.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "maple-otel.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
